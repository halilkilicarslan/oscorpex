<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Outer ring — the radiating force -->
  <circle cx="24" cy="24" r="22" stroke="#22c55e" stroke-width="2.5" opacity="0.3"/>
  <!-- Middle ring -->
  <circle cx="24" cy="24" r="16" stroke="#22c55e" stroke-width="2" opacity="0.55"/>
  <!-- Inner filled circle — the core -->
  <circle cx="24" cy="24" r="10" fill="#22c55e"/>
  <!-- "O" letter cut-out to hint at Oscorpex -->
  <circle cx="24" cy="24" r="5" fill="#0a0a0a"/>
  <!-- Energy rays radiating outward -->
  <line x1="24" y1="0" x2="24" y2="6" stroke="#22c55e" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="24" y1="42" x2="24" y2="48" stroke="#22c55e" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="0" y1="24" x2="6" y2="24" stroke="#22c55e" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="42" y1="24" x2="48" y2="24" stroke="#22c55e" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Diagonal rays -->
  <line x1="7" y1="7" x2="11" y2="11" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="37" y1="37" x2="41" y2="41" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="41" y1="7" x2="37" y2="11" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="7" y1="41" x2="11" y2="37" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
</svg>
